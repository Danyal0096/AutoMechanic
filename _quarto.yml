project:
  type: book
  render:
    - index.qmd
    - content/m01.qmd
    - content/m02.qmd
    - content/m03.qmd
    - content/m04.qmd
    - content/m05.qmd
    - content/m06.qmd
    - content/m07.qmd
    - content/m08.qmd
    - content/m09.qmd
    - content/m10.qmd
    - content/answers.qmd
    - content/glossary.qmd
    - content/references.qmd
  resources:
    - assets/fonts/
    - assets/js/

lang: fa
dir: rtl
language: _language-fa.yml
filters:
  - filters/rtl.lua

book:
  title: "مکانیک خودرو عمومی — برگرفته از آموزه‌های استاد نصیری"
  output-file: auto-mechanic-fa
  page-navigation: true
  search:
    location: sidebar
    type: overlay
  sidebar:
    style: docked
    collapse-level: 2
  chapters:
    - index.qmd
    - content/m01.qmd
    - content/m02.qmd
    - content/m03.qmd
    - content/m04.qmd
    - content/m05.qmd
    - content/m06.qmd
    - content/m07.qmd
    - content/m08.qmd
    - content/m09.qmd
    - content/m10.qmd
    - content/answers.qmd
    - content/glossary.qmd
    - content/references.qmd

crossref:
  chapters: false

format:
  html:
    lang: fa
    dir: rtl
    theme:
      - default
      - assets/css/theme.scss
    css: assets/css/styles.css
    toc: true
    toc-depth: 3
    number-sections: false
    anchor-sections: true
    smooth-scroll: true
    html-math-method: mathml
    code-copy: false
    link-external-newwindow: true
  pdf:
    pdf-engine: xelatex
    pdf-engine-opt: -interaction=batchmode
    latex-auto-install: false
    latex-min-runs: 3
    latex-max-runs: 5
    documentclass: book
    classoption:
      - oneside
      - openany
    papersize: a4
    fontsize: 12pt
    geometry:
      - top=31mm
      - bottom=31mm
      - inner=30mm
      - outer=26mm
      - headheight=15pt
    toc: true
    toc-depth: 2
    number-sections: false
    keep-tex: true
    colorlinks: true
    linkcolor: AutoMechanicBlue
    urlcolor: AutoMechanicTeal
    citecolor: AutoMechanicBlue
    fig-pos: "tbp"
    callout-icon: false
    include-in-header:
      - print/preamble.tex

execute:
  freeze: true
