<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" role="img" aria-labelledby="title desc">
  <title id="title">نقشه سامانه انتقال قدرت در ماژول هشت</title>
  <desc id="desc">مسیر گشتاور از موتور به عنصر آغاز حرکت، واحد تغییر نسبت، گرداننده نهایی، دیفرانسیل، نیم محور و تایرها همراه با مسیر موازی اطلاعات کنترل.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#174b63"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#147d78"/>
    </marker>
    <style>
      .box{fill:#f8fbfb;stroke:#174b63;stroke-width:3;rx:18}
      .control{fill:#eef7f6;stroke:#147d78;stroke-width:2.5;stroke-dasharray:8 5;rx:16}
      .main{fill:none;stroke:#174b63;stroke-width:5;marker-end:url(#arrow)}
      .signal{fill:none;stroke:#147d78;stroke-width:3;stroke-dasharray:8 5;marker-end:url(#arrow-teal)}
      .label{font-family:'DejaVu Sans',sans-serif;font-size:25px;font-weight:700;fill:#1e2933;text-anchor:middle;direction:rtl;unicode-bidi:bidi-override}
      .small{font-family:'DejaVu Sans',sans-serif;font-size:19px;fill:#566673;text-anchor:middle;direction:rtl;unicode-bidi:bidi-override}
      .latin{font-family:'DejaVu Sans',sans-serif;font-size:18px;fill:#174b63;text-anchor:middle;direction:ltr}
    </style>
  </defs>
  <rect width="1100" height="420" fill="#ffffff"/>
  <text x="550" y="40" class="label">دو مسیر هم‌زمان: توان مکانیکی و تصمیم کنترلی</text>

  <rect x="35" y="110" width="150" height="105" class="box"/>
  <text x="110" y="153" class="label">موتور</text>
  <text x="110" y="185" class="small">منبع گشتاور</text>

  <rect x="225" y="110" width="175" height="105" class="box"/>
  <text x="312" y="147" class="label">عنصر آغاز</text>
  <text x="312" y="181" class="small">مبدل یا کلاچ</text>
  <text x="312" y="205" class="latin">AT / DCT / CVT</text>

  <rect x="440" y="110" width="180" height="105" class="box"/>
  <text x="530" y="148" class="label">تغییر نسبت</text>
  <text x="530" y="183" class="small">پله‌ای یا پیوسته</text>

  <rect x="660" y="110" width="165" height="105" class="box"/>
  <text x="742" y="148" class="label">کاهش نهایی</text>
  <text x="742" y="183" class="small">پینیون و کرانویل</text>

  <rect x="865" y="110" width="200" height="105" class="box"/>
  <text x="965" y="148" class="label">دیفرانسیل و پلوس</text>
  <text x="965" y="183" class="small">توزیع به دو تایر</text>

  <path d="M185 162 H225" class="main"/>
  <path d="M400 162 H440" class="main"/>
  <path d="M620 162 H660" class="main"/>
  <path d="M825 162 H865" class="main"/>

  <rect x="315" y="290" width="470" height="85" class="control"/>
  <text x="550" y="326" class="label">کنترل الکترونیکی و هیدرولیکی</text>
  <text x="550" y="355" class="small">درخواست راننده + دورها + بار + دما ← فرمان فشار و عملگر</text>
  <path d="M450 290 C430 260 345 255 315 215" class="signal"/>
  <path d="M650 290 C680 260 580 250 550 215" class="signal"/>
  <path d="M785 330 C920 325 965 270 965 215" class="signal"/>

  <text x="550" y="407" class="small">هر معماری فقط روش مدیریت همین دو مسیر را تغییر می‌دهد؛ قانون بقای توان مرخصی نمی‌رود.</text>
</svg>
