<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 630" role="img" aria-labelledby="title desc">
  <title id="title">دو حالت نسبت در گیربکس پیوسته متغیر بر اساس شعاع موثر</title>
  <desc id="desc">در شروع حرکت شعاع موثر پولی ورودی کوچک و خروجی بزرگ است و کاهش دور ایجاد می‌شود؛ در سرعت بالا این وضعیت برعکس است. روابط سرعت و گشتاور با بازده نمایش داده شده‌اند.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#174b63"/>
    </marker>
    <style>
      .panel{fill:#fbfcfc;stroke:#cbd8dc;stroke-width:2;rx:18}
      .pulley{fill:#e9f2f6;stroke:#174b63;stroke-width:5}
      .belt{stroke:#147d78;stroke-width:10;stroke-linecap:round}
      .radius{stroke:#b56b17;stroke-width:4;stroke-dasharray:7 5;marker-end:url(#arrow)}
      .label{font-family:'DejaVu Sans',sans-serif;font-size:25px;font-weight:700;fill:#1e2933;text-anchor:middle;direction:rtl;unicode-bidi:bidi-override}
      .small{font-family:'DejaVu Sans',sans-serif;font-size:19px;fill:#566673;text-anchor:middle;direction:rtl;unicode-bidi:bidi-override}
      .latin{font-family:'DejaVu Sans',sans-serif;font-size:20px;fill:#174b63;text-anchor:middle;direction:ltr}
    </style>
  </defs>
  <rect width="1100" height="630" fill="#fff"/>
  <text x="550" y="42" class="label">نسبت CVT از شعاع مؤثر می‌آید، نه از شمارش «دنده‌های نامرئی»</text>

  <rect x="35" y="75" width="495" height="395" class="panel"/>
  <text x="282" y="115" class="label">شروع حرکت — کاهش دور</text>
  <circle cx="175" cy="265" r="52" class="pulley"/>
  <circle cx="390" cy="265" r="100" class="pulley"/>
  <line x1="175" y1="213" x2="390" y2="165" class="belt"/>
  <line x1="175" y1="317" x2="390" y2="365" class="belt"/>
  <line x1="175" y1="265" x2="175" y2="213" class="radius"/>
  <line x1="390" y1="265" x2="390" y2="165" class="radius"/>
  <text x="175" y="395" class="small">ورودی: شعاع کوچک</text>
  <text x="390" y="395" class="small">خروجی: شعاع بزرگ</text>
  <text x="282" y="442" class="latin">i = rout / rin &gt; 1</text>

  <rect x="570" y="75" width="495" height="395" class="panel"/>
  <text x="817" y="115" class="label">سرعت بالا — افزایش دور</text>
  <circle cx="710" cy="265" r="100" class="pulley"/>
  <circle cx="925" cy="265" r="52" class="pulley"/>
  <line x1="710" y1="165" x2="925" y2="213" class="belt"/>
  <line x1="710" y1="365" x2="925" y2="317" class="belt"/>
  <line x1="710" y1="265" x2="710" y2="165" class="radius"/>
  <line x1="925" y1="265" x2="925" y2="213" class="radius"/>
  <text x="710" y="395" class="small">ورودی: شعاع بزرگ</text>
  <text x="925" y="395" class="small">خروجی: شعاع کوچک</text>
  <text x="817" y="442" class="latin">i = rout / rin &lt; 1</text>

  <rect x="120" y="500" width="860" height="96" rx="16" fill="#eff6f5" stroke="#147d78" stroke-width="2"/>
  <text x="550" y="538" class="latin">v = ωin rin = ωout rout</text>
  <text x="550" y="574" class="latin">nout / nin = rin / rout   ,   Tout ≈ η Tin (rout / rin)</text>
  <text x="550" y="620" class="small">نیروی گیره باید تماس کافی برای انتقال گشتاور بسازد؛ زیادبودن بی‌دلیل آن نیز اتلاف و بار یاتاقان را بالا می‌برد.</text>
</svg>
